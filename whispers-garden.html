<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispers Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  /* ─── CSS Variables ─── */
  :root {
    --bg:        #f5f0eb;
    --bg2:       #ece5dc;
    --petal-1:   #f2b8c6;
    --petal-2:   #c8b4d8;
    --petal-3:   #a8d4c8;
    --petal-4:   #f7d59b;
    --petal-5:   #f4a7a3;
    --green:     #7ab59d;
    --stem:      #88b87a;
    --text:      #5a4e44;
    --text-light:#9b8e85;
    --glass:     rgba(255,255,255,0.55);
    --shadow:    rgba(90,78,68,0.12);
    --radius:    18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Ambient Background ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,180,216,.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(168,212,200,.22) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(242,184,198,.18) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Layout ─── */
  #app { position: relative; z-index: 1; }

  header {
    text-align: center;
    padding: 28px 20px 18px;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: .04em;
    color: var(--text);
  }
  header p {
    font-size: .85rem;
    color: var(--text-light);
    letter-spacing: .08em;
    margin-top: 4px;
    font-weight: 300;
  }

  /* ─── Tab navigation ─── */
  #tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 20px 20px;
  }
  .tab-btn {
    background: var(--glass);
    border: 1.5px solid rgba(255,255,255,.7);
    border-radius: 30px;
    padding: 8px 24px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--text-light);
    cursor: pointer;
    transition: all .3s ease;
    backdrop-filter: blur(6px);
  }
  .tab-btn.active, .tab-btn:hover {
    background: white;
    color: var(--text);
    box-shadow: 0 4px 18px var(--shadow);
  }

  /* ─── Panels ─── */
  .panel { display: none; padding: 0 16px 40px; }
  .panel.active { display: block; }

  /* ─── Studio Panel ─── */
  #studio {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
    align-items: start;
  }
  @media (max-width: 680px) {
    #studio { grid-template-columns: 1fr; }
  }

  /* ─── Tool Sidebar ─── */
  #toolbar {
    background: var(--glass);
    border: 1px solid rgba(255,255,255,.8);
    border-radius: var(--radius);
    padding: 18px 14px;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .tool-section label {
    display: block;
    font-size: .7rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .tool-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tool-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,.8);
    background: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all .2s;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .tool-btn:hover, .tool-btn.active {
    background: var(--petal-1);
    transform: scale(1.08);
    box-shadow: 0 4px 12px var(--shadow);
  }

  /* Colour swatches */
  #palette {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
  }
  .swatch {
    width: 100%; aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;
    border: 2.5px solid transparent;
    transition: transform .2s, border-color .2s;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.selected { border-color: var(--text); transform: scale(1.15); }

  /* Brush size */
  #size-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--petal-2), var(--petal-1));
    outline: none;
    cursor: pointer;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--petal-1);
    box-shadow: 0 2px 6px var(--shadow);
  }

  /* ─── Canvas area ─── */
  #canvas-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #draw-canvas {
    border-radius: var(--radius);
    box-shadow: 0 6px 30px var(--shadow);
    cursor: crosshair;
    /* Checkerboard shows transparency */
    background-color: #fff;
    background-image:
      linear-gradient(45deg, #e8e0d8 25%, transparent 25%),
      linear-gradient(-45deg, #e8e0d8 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e8e0d8 75%),
      linear-gradient(-45deg, transparent 75%, #e8e0d8 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    touch-action: none;
    display: block;
    width: 100%;
    max-width: 580px;
    height: auto;
    aspect-ratio: 580/440;
  }
  #canvas-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .action-btn {
    background: var(--glass);
    border: 1.5px solid rgba(255,255,255,.8);
    border-radius: 30px;
    padding: 9px 20px;
    font-family: 'Cormorant Garamond', serif;
    font-size: .95rem;
    font-style: italic;
    color: var(--text);
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: all .25s;
    box-shadow: 0 2px 10px var(--shadow);
  }
  .action-btn:hover {
    background: white;
    box-shadow: 0 4px 18px var(--shadow);
    transform: translateY(-1px);
  }
  .action-btn.primary {
    background: linear-gradient(135deg, var(--petal-2) 0%, var(--petal-1) 100%);
    border-color: transparent;
    color: white;
  }
  .action-btn.primary:hover { opacity: .9; }

  /* ─── Whisper modal ─── */
  #whisper-overlay {
    position: fixed; inset: 0;
    background: rgba(245,240,235,.7);
    backdrop-filter: blur(12px);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity .4s ease;
  }
  #whisper-overlay.show { display: flex; }
  #whisper-overlay.visible { opacity: 1; }
  #whisper-box {
    background: white;
    border-radius: 24px;
    padding: 36px 32px;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(90,78,68,.18);
    text-align: center;
    transform: translateY(20px);
    transition: transform .4s ease;
  }
  #whisper-overlay.visible #whisper-box { transform: translateY(0); }
  #whisper-box h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 1.7rem;
    margin-bottom: 8px;
    color: var(--text);
  }
  #whisper-box p {
    font-size: .82rem;
    color: var(--text-light);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  #whisper-input {
    width: 100%;
    border: 1.5px solid var(--bg2);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    color: var(--text);
    resize: none;
    outline: none;
    background: var(--bg);
    transition: border-color .2s;
    line-height: 1.5;
  }
  #whisper-input:focus { border-color: var(--petal-2); }
  #whisper-counter { font-size: .72rem; color: var(--text-light); margin-top: 4px; text-align: right; }
  #whisper-actions { display: flex; gap: 10px; margin-top: 16px; }
  #whisper-actions button { flex: 1; }

  /* ─── Garden ─── */
  #garden-panel {
    max-width: 960px;
    margin: 0 auto;
  }
  #garden-info {
    text-align: center;
    margin-bottom: 20px;
  }
  #garden-info p {
    font-size: .82rem;
    color: var(--text-light);
    font-style: italic;
  }
  #garden-canvas-wrap {
    position: relative;
    width: 100%;
    min-height: 520px;
    /* Sky gradient — soft daylight from top */
    background: linear-gradient(180deg,
      #dff0f5 0%,
      #eaf5ee 45%,
      #c8e6c0 75%,
      #a5c98f 100%
    );
    /* Decorative stone/wood border */
    border-radius: 20px;
    border: 6px solid #b8926a;
    outline: 3px solid #d4aa7d;
    box-shadow:
      0 0 0 6px #8c6240,
      0 10px 40px rgba(90,78,68,.25),
      inset 0 -4px 12px rgba(0,0,0,.08);
    overflow: hidden;
  }

  /* Soil bed at the bottom */
  #garden-canvas-wrap::before {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 110px;
    /* Rich layered soil */
    background: linear-gradient(180deg,
      #7a9e5a 0%,          /* grass top */
      #5a8040 12px,
      #6b4c2a 14px,        /* soil starts */
      #7a5530 40%,
      #5c3d1e 100%
    );
    /* Subtle texture via repeating dots */
    background-image:
      radial-gradient(circle at 20% 60%, rgba(0,0,0,.08) 1px, transparent 1px),
      radial-gradient(circle at 55% 75%, rgba(0,0,0,.06) 1px, transparent 1px),
      radial-gradient(circle at 80% 55%, rgba(0,0,0,.07) 1px, transparent 1px),
      radial-gradient(circle at 40% 85%, rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(180deg,
        #7a9e5a 0%,
        #5a8040 12px,
        #6b4c2a 14px,
        #7a5530 40%,
        #5c3d1e 100%
      );
    background-size: 18px 18px, 22px 22px, 14px 14px, 20px 20px, 100% 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* Grass fringe — wispy blades along the soil edge */
  #garden-canvas-wrap::after {
    content: '';
    position: absolute; bottom: 96px; left: 0; right: 0;
    height: 24px;
    background:
      /* repeating SVG-style grass blades using conic/radial gradients */
      repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 6px,
        #6aad50 6px, #6aad50 7px,
        transparent 7px, transparent 14px
      );
    /* Mask to soften edges */
    -webkit-mask-image: linear-gradient(90deg,
      transparent 0%, rgba(0,0,0,.6) 5%, rgba(0,0,0,.9) 15%,
      rgba(0,0,0,.9) 85%, rgba(0,0,0,.6) 95%, transparent 100%);
    mask-image: linear-gradient(90deg,
      transparent 0%, rgba(0,0,0,.6) 5%, rgba(0,0,0,.9) 15%,
      rgba(0,0,0,.9) 85%, rgba(0,0,0,.6) 95%, transparent 100%);
    pointer-events: none;
    z-index: 2;
  }

  .garden-flower {
    position: absolute;
    cursor: pointer;
    transform-origin: bottom center;
    animation: sway 4s ease-in-out infinite;
    z-index: 3; /* sit above soil layer */
  }
  .garden-flower canvas {
    display: block;
  }

  /* Sway animation — each flower gets a random delay via JS */
  @keyframes sway {
    0%,100% { transform: rotate(-1.5deg) translateX(-1px); }
    50%      { transform: rotate(1.5deg)  translateX(1px);  }
  }

  /* Whisper tooltip */
  .whisper-tag {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: white;
    border-radius: 12px;
    padding: 8px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: .9rem;
    font-style: italic;
    color: var(--text);
    white-space: pre-wrap;
    max-width: 180px;
    text-align: center;
    box-shadow: 0 4px 20px var(--shadow);
    pointer-events: none;
    opacity: 0;
    transition: opacity .4s ease, transform .4s ease;
    z-index: 10;
    line-height: 1.45;
  }
  .garden-flower:hover .whisper-tag,
  .garden-flower.show-whisper .whisper-tag {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  /* little arrow */
  .whisper-tag::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: white;
  }

  /* Empty garden message */
  #garden-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    color: var(--text-light);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    pointer-events: none;
  }
  #garden-empty span { font-size: 2rem; }

  /* ─── Pebbles ─── */
  .pebble {
    position: absolute;
    border-radius: 50% 60% 55% 50% / 55% 50% 60% 50%;
    background: radial-gradient(circle at 35% 35%, #d4bfa8, #9e7f62 60%, #7a5f45);
    box-shadow: inset -2px -2px 4px rgba(0,0,0,.2), 0 1px 3px rgba(0,0,0,.15);
    z-index: 4;
    pointer-events: none;
  }

  /* ─── Garden Sign ─── */
  #garden-sign {
    position: absolute;
    bottom: 105px;
    right: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 5;
  }
  #garden-sign-board {
    background: linear-gradient(135deg, #c8935a, #a06835 60%, #8a5a2a);
    color: #fce8c8;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: .72rem;
    letter-spacing: .08em;
    padding: 5px 12px;
    border-radius: 4px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.15),
      0 2px 8px rgba(0,0,0,.25);
    border: 1.5px solid #7a4e1e;
    white-space: nowrap;
  }
  #garden-sign-post {
    width: 4px;
    height: 22px;
    background: linear-gradient(to right, #9a6230, #c8935a 40%, #9a6230);
    box-shadow: 1px 0 3px rgba(0,0,0,.2);
  }

  /* ─── Sound toggle ─── */
  #sound-btn {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 50;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--glass);
    border: 1.5px solid rgba(255,255,255,.8);
    backdrop-filter: blur(8px);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    box-shadow: 0 3px 14px var(--shadow);
    transition: all .2s;
  }
  #sound-btn:hover { background: white; }

  /* ─── Flower count badge ─── */
  #flower-count {
    display: inline-block;
    background: var(--petal-3);
    color: white;
    border-radius: 30px;
    padding: 2px 10px;
    font-size: .75rem;
    margin-left: 6px;
    font-style: normal;
    vertical-align: middle;
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    letter-spacing: .04em;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header>
    <h1>Whispers Garden</h1>
    <p>paint a flower · plant a thought · let it breathe</p>
  </header>

  <!-- ── Tabs ── -->
  <div id="tabs">
    <button class="tab-btn active" data-tab="studio">✦ Studio</button>
    <button class="tab-btn" data-tab="garden">
      ❀ Garden <span id="flower-count">0</span>
    </button>
  </div>

  <!-- ══════════════ STUDIO PANEL ══════════════ -->
  <div id="studio-panel" class="panel active">
    <div id="studio">

      <!-- Sidebar tools -->
      <div id="toolbar">

        <!-- Drawing tools -->
        <div class="tool-section">
          <label>Tool</label>
          <div class="tool-btns">
            <button class="tool-btn active" data-tool="brush" title="Brush">🖌️</button>
            <button class="tool-btn" data-tool="fill"  title="Fill">🪣</button>
            <button class="tool-btn" data-tool="eraser" title="Eraser">🔲</button>
          </div>
        </div>

        <!-- Colour palette -->
        <div class="tool-section">
          <label>Colour</label>
          <div id="palette"></div>
          <!-- Custom colour input -->
          <input type="color" id="custom-color" value="#f2b8c6"
            style="margin-top:8px;width:100%;height:28px;border:none;border-radius:8px;cursor:pointer;background:none;">
        </div>

        <!-- Brush size -->
        <div class="tool-section">
          <label>Size</label>
          <input type="range" id="size-slider" min="2" max="40" value="10">
        </div>

        <!-- Opacity -->
        <div class="tool-section">
          <label>Opacity</label>
          <input type="range" id="opacity-slider" min="10" max="100" value="100"
            style="width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:linear-gradient(to right,var(--petal-3),var(--petal-2));outline:none;cursor:pointer;">
        </div>

        <!-- Templates -->
        <div class="tool-section">
          <label>Stamp</label>
          <div class="tool-btns">
            <button class="tool-btn" data-stamp="petal"  title="Petal">🌸</button>
            <button class="tool-btn" data-stamp="leaf"   title="Leaf">🍃</button>
            <button class="tool-btn" data-stamp="dot"    title="Dot">·</button>
            <button class="tool-btn" data-stamp="star"   title="Star">✦</button>
          </div>
        </div>

      </div><!-- /toolbar -->

      <!-- Canvas -->
      <div id="canvas-wrap">
        <canvas id="draw-canvas" width="580" height="440"></canvas>
        <div id="canvas-actions">
          <button class="action-btn" id="undo-btn">↩ Undo</button>
          <button class="action-btn" id="redo-btn">↪ Redo</button>
          <button class="action-btn" id="clear-btn">✕ Clear</button>
          <button class="action-btn primary" id="plant-btn">Plant this flower →</button>
        </div>
      </div>

    </div>
  </div><!-- /studio-panel -->

  <!-- ══════════════ GARDEN PANEL ══════════════ -->
  <div id="garden-panel" class="panel">
    <div id="garden-info">
      <p>Hover over a flower to hear its whisper.</p>
    </div>
    <div id="garden-canvas-wrap">
      <div id="garden-empty">
        <span>🌱</span>
        <span>Your garden awaits its first flower.</span>
      </div>

      <!-- Decorative pebbles along soil edge -->
      <div class="pebble" style="left:8%;bottom:104px;width:14px;height:9px;transform:rotate(-10deg)"></div>
      <div class="pebble" style="left:15%;bottom:108px;width:10px;height:7px;transform:rotate(15deg)"></div>
      <div class="pebble" style="left:29%;bottom:105px;width:16px;height:10px;transform:rotate(-5deg)"></div>
      <div class="pebble" style="left:43%;bottom:107px;width:11px;height:8px;transform:rotate(20deg)"></div>
      <div class="pebble" style="left:58%;bottom:104px;width:14px;height:9px;transform:rotate(-15deg)"></div>
      <div class="pebble" style="left:69%;bottom:108px;width:9px;height:6px;transform:rotate(8deg)"></div>
      <div class="pebble" style="left:79%;bottom:105px;width:13px;height:8px;transform:rotate(-12deg)"></div>
      <div class="pebble" style="left:89%;bottom:107px;width:11px;height:7px;transform:rotate(18deg)"></div>

      <!-- Little wooden garden sign -->
      <div id="garden-sign">
        <div id="garden-sign-post"></div>
        <div id="garden-sign-board">whispers garden</div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- ══════════════ WHISPER MODAL ══════════════ -->
<div id="whisper-overlay">
  <div id="whisper-box">
    <h2>A whisper for your flower</h2>
    <p>Write a small thought, wish, or feeling<br>that this flower will carry.</p>
    <textarea id="whisper-input" rows="3" maxlength="120"
      placeholder="e.g. may today be gentle on you…"></textarea>
    <div id="whisper-counter">0 / 120</div>
    <div id="whisper-actions">
      <button class="action-btn" id="skip-whisper">Plant quietly</button>
      <button class="action-btn primary" id="confirm-whisper">Plant with whisper ❀</button>
    </div>
  </div>
</div>

<!-- ══════════════ Sound button ══════════════ -->
<button id="sound-btn" title="Toggle ambient sound">🔇</button>

<script>
// ─────────────────────────────────────────────
//  WHISPERS GARDEN  –  main script
// ─────────────────────────────────────────────

/* ── Palette colours ── */
const PALETTE = [
  '#f2b8c6','#f4a7a3','#f7c59f','#f7e18a','#c3e4a0',
  '#a8d4c8','#88c9d4','#b0c8e8','#c8b4d8','#dba7c8',
  '#ffffff','#f5f0eb','#c8b4a0','#8c7b6e','#3d3530',
];

/* ── Tool state ── */
let tool        = 'brush';   // brush | fill | eraser | stamp
let brushColor  = '#f2b8c6';
let brushSize   = 10;
let opacity     = 1;
let stampType   = null;
let drawing     = false;
let lastX, lastY;

/* ── History for undo/redo ── */
const history   = [];
let histPtr     = -1;

/* ── Pending flower image (dataURL) ── */
let pendingFlowerURL = null;

/* ── Flowers in garden ── */
let flowers = [];

/* ── Audio context for ambient sound ── */
let audioCtx = null;
let soundOn  = false;
let gainNode = null;
let noiseSource = null;

// ─── Init canvas ───
const canvas  = document.getElementById('draw-canvas');
const ctx     = canvas.getContext('2d');

// Start with a transparent canvas (no white fill)
saveHistory();

// ─── Build palette ───
const paletteEl = document.getElementById('palette');
PALETTE.forEach(hex => {
  const s = document.createElement('div');
  s.className = 'swatch';
  s.style.background = hex;
  s.dataset.color = hex;
  if (hex === brushColor) s.classList.add('selected');
  s.addEventListener('click', () => selectColor(hex));
  paletteEl.appendChild(s);
});

function selectColor(hex) {
  brushColor = hex;
  document.querySelectorAll('.swatch').forEach(s =>
    s.classList.toggle('selected', s.dataset.color === hex));
  document.getElementById('custom-color').value = hex;
  // Snap back to brush if we were on eraser
  if (tool === 'eraser') setTool('brush');
}

// Custom colour picker
document.getElementById('custom-color').addEventListener('input', e => {
  selectColor(e.target.value);
});

// ─── Tool buttons ───
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => setTool(btn.dataset.tool));
});
function setTool(t) {
  tool = t;
  stampType = null;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b =>
    b.classList.toggle('active', b.dataset.tool === t));
  document.querySelectorAll('.tool-btn[data-stamp]').forEach(b =>
    b.classList.remove('active'));
}

// Stamp buttons
document.querySelectorAll('.tool-btn[data-stamp]').forEach(btn => {
  btn.addEventListener('click', () => {
    stampType = btn.dataset.stamp;
    tool = 'stamp';
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ─── Sliders ───
document.getElementById('size-slider').addEventListener('input', e => {
  brushSize = +e.target.value;
});
document.getElementById('opacity-slider').addEventListener('input', e => {
  opacity = e.target.value / 100;
});

// ─── Canvas drawing ───
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY,
  };
}

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  doDraw);
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:true});
canvas.addEventListener('touchmove',  doDraw,    {passive:true});
canvas.addEventListener('touchend',   endDraw);

function startDraw(e) {
  e.preventDefault();
  const {x, y} = getPos(e);
  if (tool === 'fill') {
    floodFill(x|0, y|0, hexToRgba(brushColor));
    saveHistory(); return;
  }
  if (tool === 'stamp') {
    drawStamp(x, y); saveHistory(); return;
  }
  drawing = true;
  [lastX, lastY] = [x, y];
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function doDraw(e) {
  if (!drawing) return;
  const {x, y} = getPos(e);
  ctx.globalAlpha = opacity;
  ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
  ctx.strokeStyle = brushColor;
  ctx.lineWidth   = brushSize;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  [lastX, lastY] = [x, y];
}

function endDraw() {
  if (drawing) { drawing = false; saveHistory(); }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

// ─── Stamps ───
function drawStamp(x, y) {
  ctx.globalAlpha = opacity;
  ctx.fillStyle   = brushColor;
  ctx.strokeStyle = brushColor;
  const r = brushSize * 1.4;
  if (stampType === 'petal') {
    // Simple ellipse petal
    ctx.save();
    ctx.translate(x, y);
    const angle = Math.random() * Math.PI * 2;
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0, -r, r * 0.5, r, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (stampType === 'leaf') {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.random() * Math.PI * 2);
    ctx.beginPath();
    ctx.moveTo(0, -r);
    ctx.quadraticCurveTo(r * 0.8, 0, 0, r);
    ctx.quadraticCurveTo(-r * 0.8, 0, 0, -r);
    ctx.fill();
    ctx.restore();
  } else if (stampType === 'dot') {
    ctx.beginPath();
    ctx.arc(x, y, r * 0.6, 0, Math.PI * 2);
    ctx.fill();
  } else if (stampType === 'star') {
    drawStar(ctx, x, y, 5, r, r * 0.45);
  }
  ctx.globalAlpha = 1;
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = (Math.PI / 2) * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
  ctx.fill();
}

// ─── Flood fill ───
function hexToRgba(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b, 255];
}

function floodFill(startX, startY, fillColor) {
  const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imgData.data;
  const w = canvas.width;

  const idx = (startY * w + startX) * 4;
  const target = [data[idx], data[idx+1], data[idx+2], data[idx+3]];

  if (colorsMatch(target, fillColor)) return;

  const stack = [[startX, startY]];
  while (stack.length) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= w || y < 0 || y >= canvas.height) continue;
    const i = (y * w + x) * 4;
    if (!colorsMatch([data[i],data[i+1],data[i+2],data[i+3]], target)) continue;
    data[i] = fillColor[0]; data[i+1] = fillColor[1];
    data[i+2] = fillColor[2]; data[i+3] = fillColor[3];
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imgData,0,0);
}

function colorsMatch(a, b, tol=30) {
  return Math.abs(a[0]-b[0]) < tol &&
         Math.abs(a[1]-b[1]) < tol &&
         Math.abs(a[2]-b[2]) < tol &&
         Math.abs(a[3]-b[3]) < tol;
}

// ─── History ───
function saveHistory() {
  // Trim redo branch
  history.splice(histPtr + 1);
  history.push(canvas.toDataURL());
  histPtr = history.length - 1;
  if (history.length > 40) { history.shift(); histPtr--; }
}

function undo() {
  if (histPtr <= 0) return;
  histPtr--;
  loadSnapshot(history[histPtr]);
}
function redo() {
  if (histPtr >= history.length - 1) return;
  histPtr++;
  loadSnapshot(history[histPtr]);
}
function loadSnapshot(dataURL) {
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
  img.src = dataURL;
}

document.getElementById('undo-btn').addEventListener('click', undo);
document.getElementById('redo-btn').addEventListener('click', redo);
document.getElementById('clear-btn').addEventListener('click', () => {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  saveHistory();
});

// ─── Keyboard shortcuts ───
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
});

// ─── Tab switching ───
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
  });
});

// ─── Plant flower → open whisper modal ───
document.getElementById('plant-btn').addEventListener('click', () => {
  pendingFlowerURL = canvas.toDataURL();
  openWhisperModal();
});

// ─── Whisper modal ───
const overlay     = document.getElementById('whisper-overlay');
const whisperInput= document.getElementById('whisper-input');
const counter     = document.getElementById('whisper-counter');

function openWhisperModal() {
  whisperInput.value = '';
  counter.textContent = '0 / 120';
  overlay.classList.add('show');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => overlay.classList.add('visible'));
  });
  whisperInput.focus();
}
function closeWhisperModal() {
  overlay.classList.remove('visible');
  setTimeout(() => overlay.classList.remove('show'), 400);
}

whisperInput.addEventListener('input', () => {
  counter.textContent = `${whisperInput.value.length} / 120`;
});

document.getElementById('skip-whisper').addEventListener('click', () => {
  plantFlower('');
});
document.getElementById('confirm-whisper').addEventListener('click', () => {
  plantFlower(whisperInput.value.trim());
});
// Close on overlay background click
overlay.addEventListener('click', e => {
  if (e.target === overlay) closeWhisperModal();
});

// ─── Plant a flower into the garden ───
function plantFlower(whisper) {
  closeWhisperModal();

  // Build a small thumbnail from the drawing canvas
  const thumbSize = 110 + Math.random() * 40 | 0; // slightly varied sizes
  const thumb = document.createElement('canvas');
  thumb.width = thumbSize; thumb.height = thumbSize;
  const tCtx = thumb.getContext('2d');

  const src = new Image();
  src.onload = () => {
    tCtx.drawImage(src, 0, 0, thumbSize, thumbSize);

    // Create flower container
    const wrapper = document.createElement('div');
    wrapper.className = 'garden-flower';

    // Position flower along the bottom area
    const gardenEl = document.getElementById('garden-canvas-wrap');
    const gW = gardenEl.offsetWidth;
    const gH = gardenEl.offsetHeight;

    // Spread flowers in a few rows near the bottom
    const leftPct = 4 + Math.random() * 84;
    const bottomPx = 118 + Math.random() * 80; // above soil (soil is ~110px tall)

    wrapper.style.left   = leftPct + '%';
    wrapper.style.bottom = bottomPx + 'px';
    wrapper.style.animationDelay = (Math.random() * 2).toFixed(2) + 's';
    wrapper.style.animationDuration = (3.5 + Math.random() * 2).toFixed(2) + 's';

    // Append the thumbnail canvas
    wrapper.appendChild(thumb);

    // Whisper tag
    if (whisper) {
      const tag = document.createElement('div');
      tag.className = 'whisper-tag';
      tag.textContent = whisper;
      wrapper.appendChild(tag);
    }

    // On mobile, toggle whisper on tap
    wrapper.addEventListener('click', () => {
      wrapper.classList.toggle('show-whisper');
      setTimeout(() => wrapper.classList.remove('show-whisper'), 3000);
    });

    gardenEl.appendChild(wrapper);
    document.getElementById('garden-empty').style.display = 'none';

    // Update count badge
    flowers.push({ whisper, dataURL: src.src });
    document.getElementById('flower-count').textContent = flowers.length;

    // Switch to garden view
    document.querySelector('[data-tab="garden"]').click();

    // Clear canvas for next flower
    setTimeout(() => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      saveHistory();
    }, 600);
  };
  src.src = pendingFlowerURL;
}

// ─── Ambient sound (Web Audio API) ───
// Generates soft pink-noise style wind sound
function startAmbient() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // White noise buffer
  const bufferSize = audioCtx.sampleRate * 4;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < bufferSize; i++) {
    const w = Math.random() * 2 - 1;
    // Pink-ish noise coefficients
    b0 = 0.99886*b0 + w*0.0555179;
    b1 = 0.99332*b1 + w*0.0750759;
    b2 = 0.96900*b2 + w*0.1538520;
    b3 = 0.86650*b3 + w*0.3104856;
    b4 = 0.55000*b4 + w*0.5329522;
    b5 = -0.7616*b5 - w*0.0168980;
    data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
    b6 = w * 0.115926;
  }

  noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = buffer;
  noiseSource.loop = true;

  // Low-pass filter for wind feel
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 800;

  gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 1.5);

  noiseSource.connect(lpf);
  lpf.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  noiseSource.start();
}

function stopAmbient() {
  if (!gainNode) return;
  gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
  setTimeout(() => {
    if (noiseSource) { try { noiseSource.stop(); } catch(e){} noiseSource = null; }
  }, 1200);
}

document.getElementById('sound-btn').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) startAmbient(); else stopAmbient();
});

</script>
